<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>My Certificates | CareerHub</title>


    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >


    <link
        rel="stylesheet"
        href="/static/css/style.css"
    >

</head>


<body>


    <!-- Navbar -->
    <nav class="navbar navbar-dark portal-navbar">

        <div class="container">

            <a
                class="navbar-brand"
                href="/student/dashboard"
            >
                CareerHub Student
            </a>


            <div>

                <a
                    href="/student/dashboard"
                    class="btn btn-outline-light me-2"
                >
                    Dashboard
                </a>


                <button
                    class="btn btn-light"
                    onclick="logout()"
                >
                    Logout
                </button>

            </div>

        </div>

    </nav>



    <main class="container py-5">


        <!-- Header -->
        <div class="dashboard-header mb-5">

            <h2>
                My Certificates
            </h2>

            <p class="mb-0">
                View and download your internship completion certificates.
            </p>

        </div>



        <!-- Message -->
        <div
            id="message"
            class="alert d-none"
        >
        </div>



        <!-- Certificate Cards -->
        <div
            class="row g-4"
            id="certificateContainer"
        >

            <div class="col-12 text-center">

                <p>
                    Loading certificates...
                </p>

            </div>

        </div>


    </main>


    <script src="/static/js/student_certificates.js"></script>


</body>

</html>
