<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Register | CareerHub</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="/static/css/style.css"
    >
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-dark portal-navbar">

        <div class="container">

            <a class="navbar-brand" href="/">
                CareerHub Portal
            </a>

        </div>

    </nav>


    <!-- Registration Section -->
    <section class="auth-section">

        <div class="auth-card">

            <h2 class="auth-title">
                Create Account
            </h2>

            <div
                id="message"
                class="alert d-none"
            ></div>


            <form id="registerForm">

                <div class="mb-3">

                    <label class="form-label">
                        Full Name
                    </label>

                    <input
                        type="text"
                        id="full_name"
                        class="form-control"
                        required
                    >

                </div>


                <div class="mb-3">

                    <label class="form-label">
                        Email
                    </label>

                    <input
                        type="email"
                        id="email"
                        class="form-control"
                        required
                    >

                </div>


                <div class="mb-3">

                    <label class="form-label">
                        Password
                    </label>

                    <input
                        type="password"
                        id="password"
                        class="form-control"
                        required
                    >

                </div>


                <button
                    type="submit"
                    class="btn btn-portal w-100"
                >
                    Register
                </button>

            </form>


            <p class="text-center mt-4">

                Already have an account?

                <a href="/login">
                    Login
                </a>

            </p>

        </div>

    </section>


    <script src="/static/js/auth.js"></script>

</body>

</html>
