<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Manage Internships | CareerHub</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="/static/css/style.css"
    >

</head>

<body>


    <!-- Navbar -->
    <nav class="navbar navbar-dark portal-navbar">

        <div class="container">

            <a
                class="navbar-brand"
                href="/admin/dashboard"
            >
                CareerHub Admin
            </a>

            <div>

                <a
                    href="/admin/dashboard"
                    class="btn btn-outline-light me-2"
                >
                    Dashboard
                </a>

                <button
                    class="btn btn-light"
                    onclick="logout()"
                >
                    Logout
                </button>

            </div>

        </div>

    </nav>


    <main class="container py-5">


        <!-- Header -->
        <div class="dashboard-header mb-5">

            <div
                class="d-flex justify-content-between align-items-center flex-wrap gap-3"
            >

                <div>

                    <h2>
                        Internship Management
                    </h2>

                    <p class="mb-0">
                        Create, update and manage internship opportunities.
                    </p>

                </div>


                <button
                    class="btn btn-light"
                    onclick="openCreateModal()"
                >
                    + Create Internship
                </button>

            </div>

        </div>


        <!-- Message -->
        <div
            id="message"
            class="alert d-none"
        >
        </div>


        <!-- Internship Table -->
        <div class="portal-card p-4">

            <h3 class="mb-4">
                All Internships
            </h3>


            <div class="table-responsive">

                <table class="table portal-table align-middle">

                    <thead>

                        <tr>

                            <th>ID</th>

                            <th>Title</th>

                            <th>Description</th>

                            <th>Duration</th>

                            <th>Vacancies</th>

                            <th>Actions</th>

                        </tr>

                    </thead>


                    <tbody id="internshipTable">

                        <tr>

                            <td colspan="6">
                                Loading internships...
                            </td>

                        </tr>

                    </tbody>

                </table>

            </div>

        </div>


    </main>



    <!-- Internship Modal -->
    <div
        class="modal fade"
        id="internshipModal"
        tabindex="-1"
    >

        <div class="modal-dialog modal-lg">

            <div class="modal-content">


                <div class="modal-header">

                    <h5
                        class="modal-title"
                        id="modalTitle"
                    >
                        Create Internship
                    </h5>

                    <button
                        type="button"
                        class="btn-close"
                        data-bs-dismiss="modal"
                    >
                    </button>

                </div>


                <div class="modal-body">

                    <form id="internshipForm">


                        <input
                            type="hidden"
                            id="internshipId"
                        >


                        <div class="mb-3">

                            <label class="form-label">
                                Internship Title
                            </label>

                            <input
                                type="text"
                                id="title"
                                class="form-control"
                                required
                            >

                        </div>


                        <div class="mb-3">

                            <label class="form-label">
                                Description
                            </label>

                            <textarea
                                id="description"
                                class="form-control"
                                rows="4"
                                required
                            ></textarea>

                        </div>


                        <div class="row">


                            <div class="col-md-6">

                                <div class="mb-3">

                                    <label class="form-label">
                                        Duration
                                    </label>

                                    <input
                                        type="text"
                                        id="duration"
                                        class="form-control"
                                        placeholder="Example: 3 Months"
                                        required
                                    >

                                </div>

                            </div>


                            <div class="col-md-6">

                                <div class="mb-3">

                                    <label class="form-label">
                                        Vacancies
                                    </label>

                                    <input
                                        type="number"
                                        id="vacancies"
                                        class="form-control"
                                        min="1"
                                        required
                                    >

                                </div>

                            </div>


                        </div>


                        <button
                            type="submit"
                            class="btn btn-portal w-100"
                        >
                            Save Internship
                        </button>


                    </form>

                </div>

            </div>

        </div>

    </div>


    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    ></script>

    <script src="/static/js/admin_internships.js"></script>


</body>

</html>
