<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>My Tasks | CareerHub</title>


    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >


    <link
        rel="stylesheet"
        href="/static/css/style.css"
    >

</head>


<body>


    <!-- Navbar -->
    <nav class="navbar navbar-dark portal-navbar">

        <div class="container">

            <a
                class="navbar-brand"
                href="/student/dashboard"
            >
                CareerHub Student
            </a>


            <div>

                <a
                    href="/student/dashboard"
                    class="btn btn-outline-light me-2"
                >
                    Dashboard
                </a>


                <button
                    class="btn btn-light"
                    onclick="logout()"
                >
                    Logout
                </button>

            </div>

        </div>

    </nav>



    <main class="container py-5">


        <!-- Header -->
        <div class="dashboard-header mb-5">

            <h2>
                My Internship Tasks
            </h2>

            <p class="mb-0">
                View assigned tasks, submit your work and track reviews.
            </p>

        </div>



        <!-- Message -->
        <div
            id="message"
            class="alert d-none"
        >
        </div>



        <!-- Assigned Tasks -->
        <section>

            <h3 class="mb-4">
                Assigned Tasks
            </h3>


            <div
                class="row g-4"
                id="taskContainer"
            >

                <div class="col-12 text-center">

                    <p>
                        Loading tasks...
                    </p>

                </div>

            </div>

        </section>



        <!-- My Submissions -->
        <section class="mt-5">

            <div class="portal-card p-4">

                <h3 class="mb-4">
                    My Submissions
                </h3>


                <div class="table-responsive">

                    <table class="table portal-table align-middle">

                        <thead>

                            <tr>

                                <th>
                                    Task
                                </th>

                                <th>
                                    GitHub Link
                                </th>

                                <th>
                                    Status
                                </th>

                                <th>
                                    Marks
                                </th>

                                <th>
                                    Feedback
                                </th>

                            </tr>

                        </thead>


                        <tbody id="submissionTable">

                            <tr>

                                <td colspan="5">

                                    Loading submissions...

                                </td>

                            </tr>

                        </tbody>

                    </table>

                </div>

            </div>

        </section>


    </main>



    <!-- Submission Modal -->
    <div
        class="modal fade"
        id="submissionModal"
        tabindex="-1"
    >

        <div class="modal-dialog">

            <div class="modal-content">

                <div class="modal-header">

                    <h5 class="modal-title">
                        Submit Task
                    </h5>


                    <button
                        type="button"
                        class="btn-close"
                        data-bs-dismiss="modal"
                    >
                    </button>

                </div>


                <div class="modal-body">

                    <form id="submissionForm">


                        <input
                            type="hidden"
                            id="taskId"
                        >


                        <div class="mb-3">

                            <label class="form-label">
                                Task
                            </label>


                            <input
                                type="text"
                                id="taskTitle"
                                class="form-control"
                                readonly
                            >

                        </div>



                        <div class="mb-3">

                            <label class="form-label">
                                GitHub Repository Link
                            </label>


                            <input
                                type="url"
                                id="githubLink"
                                class="form-control"
                                placeholder="https://github.com/username/project"
                                required
                            >

                        </div>



                        <div class="mb-3">

                            <label class="form-label">
                                Remarks
                            </label>


                            <textarea
                                id="remarks"
                                class="form-control"
                                rows="4"
                                placeholder="Write a short note about your work..."
                                required
                            ></textarea>

                        </div>



                        <button
                            type="submit"
                            class="btn btn-portal w-100"
                        >
                            Submit Task
                        </button>


                    </form>

                </div>

            </div>

        </div>

    </div>



    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    ></script>


    <script src="/static/js/student_tasks.js"></script>


</body>

</html>
