<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Applications | CareerHub</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="/static/css/style.css"
    >

</head>


<body>

    <!-- Navbar -->
    <nav class="navbar navbar-dark portal-navbar">

        <div class="container">

            <a
                class="navbar-brand"
                href="/admin/dashboard"
            >
                CareerHub Admin
            </a>


            <div>

                <a
                    href="/admin/dashboard"
                    class="btn btn-outline-light me-2"
                >
                    Dashboard
                </a>


                <button
                    class="btn btn-light"
                    onclick="logout()"
                >
                    Logout
                </button>

            </div>

        </div>

    </nav>


    <main class="container py-5">


        <!-- Header -->
        <div class="dashboard-header mb-5">

            <h2>
                Internship Applications
            </h2>

            <p class="mb-0">
                Review student applications and update their status.
            </p>

        </div>


        <!-- Message -->
        <div
            id="message"
            class="alert d-none"
        >
        </div>


        <!-- Summary Cards -->
        <div class="row g-4 mb-5">

            <div class="col-md-3">

                <div class="stat-card">

                    <p class="text-muted">
                        Total Applications
                    </p>

                    <div
                        class="stat-number"
                        id="totalApplications"
                    >
                        0
                    </div>

                </div>

            </div>


            <div class="col-md-3">

                <div class="stat-card">

                    <p class="text-muted">
                        Pending
                    </p>

                    <div
                        class="stat-number"
                        id="pendingApplications"
                    >
                        0
                    </div>

                </div>

            </div>


            <div class="col-md-3">

                <div class="stat-card">

                    <p class="text-muted">
                        Approved
                    </p>

                    <div
                        class="stat-number"
                        id="approvedApplications"
                    >
                        0
                    </div>

                </div>

            </div>


            <div class="col-md-3">

                <div class="stat-card">

                    <p class="text-muted">
                        Rejected
                    </p>

                    <div
                        class="stat-number"
                        id="rejectedApplications"
                    >
                        0
                    </div>

                </div>

            </div>

        </div>


        <!-- Applications Table -->
        <div class="portal-card p-4">

            <div
                class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-4"
            >

                <h3 class="mb-0">
                    All Applications
                </h3>


                <select
                    id="statusFilter"
                    class="form-select"
                    style="max-width: 220px;"
                    onchange="filterApplications()"
                >

                    <option value="All">
                        All Status
                    </option>

                    <option value="Pending">
                        Pending
                    </option>

                    <option value="Approved">
                        Approved
                    </option>

                    <option value="Rejected">
                        Rejected
                    </option>

                </select>

            </div>


            <div class="table-responsive">

                <table class="table portal-table align-middle">

                    <thead>

                        <tr>

                            <th>ID</th>

                            <th>Student</th>

                            <th>Email</th>

                            <th>Internship</th>

                            <th>Duration</th>

                            <th>Status</th>

                            <th>Actions</th>

                        </tr>

                    </thead>


                    <tbody id="applicationTable">

                        <tr>

                            <td colspan="7">
                                Loading applications...
                            </td>

                        </tr>

                    </tbody>

                </table>

            </div>

        </div>


    </main>


    <script src="/static/js/admin_applications.js"></script>

</body>

</html>
