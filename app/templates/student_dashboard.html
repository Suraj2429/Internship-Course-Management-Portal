<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Student Dashboard | CareerHub</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="/static/css/style.css"
    >
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-dark portal-navbar">

        <div class="container">

            <a class="navbar-brand" href="#">
                CareerHub Student
            </a>

            <button
                class="btn btn-outline-light"
                onclick="logout()"
            >
                Logout
            </button>

        </div>

    </nav>


    <main class="container py-5">

        <!-- Welcome Section -->
        <div class="dashboard-header mb-5">

            <h2 id="studentName">
                Welcome, Student
            </h2>

            <p class="mb-0">
                Track your internships, courses and task progress.
            </p>

        </div>


        <!-- Statistics -->
        <div class="row g-4">

            <div class="col-md-4">

                <div class="stat-card">

                    <p class="text-muted">
                        Applied Internships
                    </p>

                    <div
                        class="stat-number"
                        id="appliedInternships"
                    >
                        0
                    </div>

                </div>

            </div>


            <div class="col-md-4">

                <div class="stat-card">

                    <p class="text-muted">
                        Approved Internships
                    </p>

                    <div
                        class="stat-number"
                        id="approvedInternships"
                    >
                        0
                    </div>

                </div>

            </div>


            <div class="col-md-4">

                <div class="stat-card">

                    <p class="text-muted">
                        Enrolled Courses
                    </p>

                    <div
                        class="stat-number"
                        id="enrolledCourses"
                    >
                        0
                    </div>

                </div>

            </div>


            <div class="col-md-4">

                <div class="stat-card">

                    <p class="text-muted">
                        Assigned Tasks
                    </p>

                    <div
                        class="stat-number"
                        id="assignedTasks"
                    >
                        0
                    </div>

                </div>

            </div>


            <div class="col-md-4">

                <div class="stat-card">

                    <p class="text-muted">
                        Completed Tasks
                    </p>

                    <div
                        class="stat-number"
                        id="completedTasks"
                    >
                        0
                    </div>

                </div>

            </div>


            <div class="col-md-4">

                <div class="stat-card">

                    <p class="text-muted">
                        Overall Progress
                    </p>

                    <div class="stat-number">

                        <span id="overallProgress">
                            0
                        </span>%

                    </div>

                </div>

            </div>

        </div>


        <!-- Quick Actions -->
        <div class="portal-card p-4 mt-5">

            <h4 class="mb-4">
                Quick Actions
            </h4>

            <div class="d-flex flex-wrap gap-3">

                <a
                    href="/student/internships"
                    class="btn btn-portal"
                >
                    View Internships
                </a>

                <a
                    href="/student/courses"
                    class="btn btn-portal"
                >
                    View Courses
                </a>

                <a
                    href="/student/tasks"
                    class="btn btn-portal"
                >
                    My Tasks
                </a>

                <a
                    href="/student/certificates"
                    class="btn btn-portal"
                >
                    Certificates
                </a>

            </div>

        </div>

    </main>


    <script src="/static/js/student_dashboard.js"></script>

</body>

</html>
