<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Generate Certificates | CareerHub</title>


    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >


    <link
        rel="stylesheet"
        href="/static/css/style.css"
    >

</head>


<body>


    <!-- Navbar -->
    <nav class="navbar navbar-dark portal-navbar">

        <div class="container">

            <a
                class="navbar-brand"
                href="/admin/dashboard"
            >
                CareerHub Admin
            </a>


            <div>

                <a
                    href="/admin/dashboard"
                    class="btn btn-outline-light me-2"
                >
                    Dashboard
                </a>


                <button
                    class="btn btn-light"
                    onclick="logout()"
                >
                    Logout
                </button>

            </div>

        </div>

    </nav>



    <main class="container py-5">


        <!-- Header -->
        <div class="dashboard-header mb-5">

            <h2>
                Certificate Management
            </h2>

            <p class="mb-0">
                Generate completion certificates for eligible students.
            </p>

        </div>



        <!-- Message -->
        <div
            id="message"
            class="alert d-none"
        >
        </div>



        <div class="row g-4">


            <!-- Certificate Form -->
            <div class="col-lg-5">

                <div class="portal-card p-4">

                    <h3 class="mb-4">
                        Generate Certificate
                    </h3>


                    <form id="certificateForm">


                        <!-- Student -->
                        <div class="mb-3">

                            <label class="form-label">
                                Student
                            </label>


                            <select
                                id="studentId"
                                class="form-select"
                                required
                                onchange="loadStudentInternships()"
                            >

                                <option value="">
                                    Select Student
                                </option>

                            </select>

                        </div>



                        <!-- Internship -->
                        <div class="mb-4">

                            <label class="form-label">
                                Internship
                            </label>


                            <select
                                id="internshipId"
                                class="form-select"
                                required
                            >

                                <option value="">
                                    Select Internship
                                </option>

                            </select>

                        </div>



                        <div class="alert alert-info">

                            A student must have at least
                            <strong>80% approved tasks</strong>
                            for the selected internship.

                        </div>



                        <button
                            type="submit"
                            class="btn btn-portal w-100"
                        >
                            Generate Certificate
                        </button>


                    </form>

                </div>

            </div>



            <!-- Eligible Students -->
            <div class="col-lg-7">

                <div class="portal-card p-4">

                    <h3 class="mb-4">
                        Approved Internship Applications
                    </h3>


                    <div class="table-responsive">

                        <table class="table portal-table align-middle">

                            <thead>

                                <tr>

                                    <th>Student</th>

                                    <th>Internship</th>

                                    <th>Application</th>

                                </tr>

                            </thead>


                            <tbody id="eligibleTable">

                                <tr>

                                    <td colspan="3">
                                        Loading students...
                                    </td>

                                </tr>

                            </tbody>

                        </table>

                    </div>

                </div>

            </div>


        </div>


    </main>


    <script src="/static/js/admin_certificates.js"></script>


</body>

</html>
