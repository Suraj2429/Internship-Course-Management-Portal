<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Internships | CareerHub</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="/static/css/style.css"
    >
</head>


<body>

    <!-- Navbar -->
    <nav class="navbar navbar-dark portal-navbar">

        <div class="container">

            <a
                class="navbar-brand"
                href="/student/dashboard"
            >
                CareerHub Student
            </a>

            <div>

                <a
                    href="/student/dashboard"
                    class="btn btn-outline-light me-2"
                >
                    Dashboard
                </a>

                <button
                    class="btn btn-light"
                    onclick="logout()"
                >
                    Logout
                </button>

            </div>

        </div>

    </nav>


    <main class="container py-5">

        <!-- Page Header -->
        <div class="dashboard-header mb-5">

            <h2>
                Internship Opportunities
            </h2>

            <p class="mb-0">
                Explore available internships and apply directly.
            </p>

        </div>


        <!-- Message -->
        <div
            id="message"
            class="alert d-none"
        ></div>


        <!-- Internship Cards -->
        <h3 class="mb-4">
            Available Internships
        </h3>

        <div
            class="row g-4"
            id="internshipContainer"
        >

            <div class="col-12 text-center">

                <p>
                    Loading internships...
                </p>

            </div>

        </div>


        <!-- My Applications -->
        <section class="mt-5">

            <div class="portal-card p-4">

                <h3 class="mb-4">
                    My Applications
                </h3>


                <div class="table-responsive">

                    <table class="table portal-table">

                        <thead>

                            <tr>
                                <th>Application ID</th>
                                <th>Internship</th>
                                <th>Status</th>
                            </tr>

                        </thead>


                        <tbody id="applicationTable">

                            <tr>

                                <td colspan="3">
                                    Loading applications...
                                </td>

                            </tr>

                        </tbody>

                    </table>

                </div>

            </div>

        </section>

    </main>


    <script src="/static/js/student_internships.js"></script>

</body>

</html>
