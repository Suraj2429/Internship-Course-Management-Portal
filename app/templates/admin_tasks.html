<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Manage Tasks | CareerHub</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="/static/css/style.css"
    >

</head>


<body>


    <!-- Navbar -->
    <nav class="navbar navbar-dark portal-navbar">

        <div class="container">

            <a
                class="navbar-brand"
                href="/admin/dashboard"
            >
                CareerHub Admin
            </a>


            <div>

                <a
                    href="/admin/dashboard"
                    class="btn btn-outline-light me-2"
                >
                    Dashboard
                </a>


                <button
                    class="btn btn-light"
                    onclick="logout()"
                >
                    Logout
                </button>

            </div>

        </div>

    </nav>



    <main class="container py-5">


        <!-- Header -->
        <div class="dashboard-header mb-5">

            <div
                class="d-flex justify-content-between align-items-center flex-wrap gap-3"
            >

                <div>

                    <h2>
                        Task Management
                    </h2>

                    <p class="mb-0">
                        Create and manage tasks for internship programs.
                    </p>

                </div>


                <button
                    class="btn btn-light"
                    onclick="openCreateModal()"
                >
                    + Create Task
                </button>

            </div>

        </div>



        <!-- Message -->
        <div
            id="message"
            class="alert d-none"
        >
        </div>



        <!-- Statistics -->
        <div class="row g-4 mb-5">

            <div class="col-md-4">

                <div class="stat-card">

                    <p class="text-muted">
                        Total Tasks
                    </p>

                    <div
                        class="stat-number"
                        id="totalTasks"
                    >
                        0
                    </div>

                </div>

            </div>


            <div class="col-md-4">

                <div class="stat-card">

                    <p class="text-muted">
                        Internships With Tasks
                    </p>

                    <div
                        class="stat-number"
                        id="internshipsWithTasks"
                    >
                        0
                    </div>

                </div>

            </div>


            <div class="col-md-4">

                <div class="stat-card">

                    <p class="text-muted">
                        Available Internships
                    </p>

                    <div
                        class="stat-number"
                        id="totalInternships"
                    >
                        0
                    </div>

                </div>

            </div>

        </div>



        <!-- Task Table -->
        <div class="portal-card p-4">

            <div
                class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-4"
            >

                <h3 class="mb-0">
                    All Tasks
                </h3>


                <select
                    id="internshipFilter"
                    class="form-select"
                    style="max-width: 280px;"
                    onchange="filterTasks()"
                >

                    <option value="All">
                        All Internships
                    </option>

                </select>

            </div>


            <div class="table-responsive">

                <table class="table portal-table align-middle">

                    <thead>

                        <tr>

                            <th>ID</th>

                            <th>Task</th>

                            <th>Internship</th>

                            <th>Description</th>

                            <th>Deadline</th>

                            <th>Actions</th>

                        </tr>

                    </thead>


                    <tbody id="taskTable">

                        <tr>

                            <td colspan="6">
                                Loading tasks...
                            </td>

                        </tr>

                    </tbody>

                </table>

            </div>

        </div>


    </main>



    <!-- Task Modal -->
    <div
        class="modal fade"
        id="taskModal"
        tabindex="-1"
    >

        <div class="modal-dialog modal-lg">

            <div class="modal-content">


                <div class="modal-header">

                    <h5
                        class="modal-title"
                        id="modalTitle"
                    >
                        Create Task
                    </h5>


                    <button
                        type="button"
                        class="btn-close"
                        data-bs-dismiss="modal"
                    >
                    </button>

                </div>


                <div class="modal-body">


                    <form id="taskForm">


                        <input
                            type="hidden"
                            id="taskId"
                        >


                        <!-- Internship -->
                        <div class="mb-3">

                            <label class="form-label">
                                Internship
                            </label>


                            <select
                                id="internshipId"
                                class="form-select"
                                required
                            >

                                <option value="">
                                    Select Internship
                                </option>

                            </select>

                        </div>



                        <!-- Task Title -->
                        <div class="mb-3">

                            <label class="form-label">
                                Task Title
                            </label>


                            <input
                                type="text"
                                id="title"
                                class="form-control"
                                required
                            >

                        </div>



                        <!-- Description -->
                        <div class="mb-3">

                            <label class="form-label">
                                Description
                            </label>


                            <textarea
                                id="description"
                                class="form-control"
                                rows="4"
                                required
                            ></textarea>

                        </div>



                        <!-- Deadline -->
                        <div class="mb-3">

                            <label class="form-label">
                                Deadline
                            </label>


                            <input
                                type="datetime-local"
                                id="deadline"
                                class="form-control"
                                required
                            >

                        </div>



                        <button
                            type="submit"
                            class="btn btn-portal w-100"
                        >
                            Save Task
                        </button>


                    </form>

                </div>

            </div>

        </div>

    </div>



    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    ></script>


    <script src="/static/js/admin_tasks.js"></script>


</body>

</html>
