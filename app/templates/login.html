<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Login | CareerHub</title>

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    >

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="/static/css/style.css"
    >
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-dark portal-navbar">

        <div class="container">

            <a class="navbar-brand" href="/">
                CareerHub Portal
            </a>

        </div>

    </nav>


    <!-- Login Section -->
    <section class="auth-section">

        <div class="auth-card">

            <h2 class="auth-title">
                Welcome Back
            </h2>


            <div
                id="message"
                class="alert d-none"
            ></div>


            <form id="loginForm">

                <div class="mb-3">

                    <label class="form-label">
                        Email
                    </label>

                    <input
                        type="email"
                        id="email"
                        class="form-control"
                        required
                    >

                </div>


                <div class="mb-3">

                    <label
                        for="password"
                        class="form-label"
                    >
                        Password
                    </label>

                    <div class="input-group">

                        <input
                            type="password"
                            id="password"
                            class="form-control"
                            required
                        >

                        <button
                            class="btn btn-outline-secondary"
                            type="button"
                            onclick="togglePassword()"
                            aria-label="Show or hide password"
                        >
                            <i
                                id="eyeIcon"
                                class="bi bi-eye"
                            ></i>
                        </button>

                    </div>

                </div>


                <button
                    type="submit"
                    class="btn btn-portal w-100"
                >
                    Login
                </button>

            </form>


            <p class="text-center mt-4">

                Don't have an account?

                <a href="/register">
                    Register
                </a>

            </p>

        </div>

    </section>


    <script src="/static/js/auth.js"></script>

</body>

</html>
